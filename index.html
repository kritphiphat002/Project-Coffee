<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coffee Shop</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="title">Coffee Shop</h1>

<div class="container">

<div class="menu">

<div class="item" onclick="addItem('Espresso',50)">
<img src="https://upload.wikimedia.org/wikipedia/commons/4/45/A_small_cup_of_coffee.JPG">
<p>Espresso</p>
<p>50 บาท</p>
</div>

<div class="item" onclick="addItem('Latte',60)">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/7c/Caff%C3%A8_Latte_at_Pulse_Cafe.jpg">
<p>Latte</p>
<p>60 บาท</p>
</div>

<div class="item" onclick="addItem('Cappuccino',60)">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/70/Cappuccino.jpg">
<p>Cappuccino</p>
<p>60 บาท</p>
</div>

<div class="item" onclick="addItem('ชาไทย',50)">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/0f/Thai_tea.jpg">
<p>ชาไทย</p>
<p>50 บาท</p>
</div>

<div class="item" onclick="addItem('นมชมพู',45)">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Pink_milk.jpg">
<p>นมชมพู</p>
<p>45 บาท</p>
</div>

<div class="item" onclick="addItem('โดนัท',35)">
<img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Glazed-Donut.jpg">
<p>Donut</p>
<p>35 บาท</p>
</div>

<div class="item" onclick="addItem('เค้กช็อกโกแลต',80)">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/7f/Chocolate_cake.jpg">
<p>Chocolate Cake</p>
<p>80 บาท</p>
</div>

<div class="item" onclick="addItem('ครัวซองต์',55)">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6c/Croissant-Petr_Kratochvil.jpg">
<p>Croissant</p>
<p>55 บาท</p>
</div>

</div>

<div class="pos">

<h2>รายการสั่งซื้อ</h2>

<ul id="cart"></ul>

<h3>รวม: <span id="total">0</span> บาท</h3>

<input id="money" placeholder="รับเงิน">

<button onclick="pay()">ชำระเงิน</button>

<button onclick="saveReceipt()">บันทึกสลิป</button>

<div id="receipt"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
